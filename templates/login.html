<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VeraxIA - Entrar</title>
  <style>
    body { font-family: sans-serif; background: #0d0d0d; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #1a1a1a; padding: 2rem; border-radius: 12px; width: 320px; }
    h2 { text-align: center; color: #c084fc; }
    input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #eee; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    button:hover { background: #6d28d9; }
    button:disabled { background: #444; cursor: not-allowed; }
    .error { color: #f87171; text-align: center; margin-top: 8px; font-size: 0.9rem; }
    .success { color: #4ade80; text-align: center; margin-top: 8px; font-size: 0.9rem; }
    .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .link a { color: #c084fc; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🤍 Entrar a VeraxIA</h2>
    <input type="email" id="email" placeholder="Tu email" required>
    <input type="password" id="password" placeholder="Tu contraseña" required>
    <button id="btn" onclick="login()">Entrar</button>
    <p id="msg" style="display:none"></p>
    <div class="link"><a href="/registro">¿No tienes cuenta? Regístrate aquí</a></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");

      msg.style.display = "none";

      if (!email || !password) {
        msg.className = "error";
        msg.textContent = "Por favor completa todos los campos.";
        msg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Entrando...";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          msg.className = "success";
          msg.textContent = "✅ ¡Bienvenida! Redirigiendo...";
          msg.style.display = "block";
          // Si es admin va al panel, si no va al chat
          if (data.plan === "admin") {
            setTimeout(() => { window.location.href = "/admin"; }, 1000);
          } else {
            setTimeout(() => { window.location.href = "/"; }, 1000);
          }
        } else {
          msg.className = "error";
          msg.textContent = data.error || "Email o contraseña incorrectos.";
          msg.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      } catch(e) {
        msg.className = "error";
        msg.textContent = "Error de conexión. Intenta de nuevo.";
        msg.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    }
  </script>
</body>
</html>
